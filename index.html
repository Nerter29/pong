<!DOCTYPE html>
<html lang="fr">

  <head>
      <meta charset="UTF-8">
      <meta name="viewport" content="width=device-width, initial-scale=1.0">
      <title>Pong</title>
      <link rel="icon" type="image/vnd.icon" href="../../../assets/images/N_Logo_zoomed.ico">

      <link rel="stylesheet" href="styles.css" type="text/css">
  </head>

  <body>
    <div class="title-bloc">
      <h1>Pong Online</h1>
      <div class="info-bloc">
        <ul>
          <li id="playerId">Identifiant de joueur : 0</li>
          <li id="room">Salle : 0</li>
          <li id="status">Status : en attente d'un 2ème joueur</li>

        </ul>
      </div>
    </div>
    <div class="canvas-bloc">
          <canvas id="game-canvas"></canvas>
    </div>

    <div class="controls-bloc" id="controls-bloc">
      <div class="control-text">
        <p>Déplacez-vous avec les flèches du clavier</p>
        <img src = "../../../assets/images/po/icons/arrows.png" width="60" height="60">
      </div>
      <div class="button-group">
        <button class="control-btn" id="up-btn"></button>
        <button class="control-btn" id="down-btn"></button>
      </div>
      
    </div>
    
    
    <script type="module" src="frontend/main.js"></script>
  </body>
</html>
